<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binaty — Créer un compte promoteur</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--g0:#0a1a10;--g1:#1a3a2a;--g2:#2d6b4a;--g3:#4a9065;--g4:#7fc4a0;--g5:#b8d9c5;--white:#f9fdf9;--danger:#b83232;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--g0);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 0;}
.card{background:var(--g1);border:0.5px solid rgba(127,196,160,0.15);border-radius:16px;padding:40px;width:100%;max-width:440px;margin:20px;}
.logo{font-family:'Playfair Display',serif;font-size:28px;text-align:center;margin-bottom:8px;}
.logo span{color:var(--g3);}
.subtitle{text-align:center;color:var(--g4);font-size:14px;margin-bottom:28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
label{display:block;font-size:12px;color:var(--g4);margin-bottom:6px;}
input,select{width:100%;background:rgba(10,26,16,0.6);border:0.5px solid rgba(127,196,160,0.2);border-radius:10px;padding:12px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
input:focus,select:focus{border-color:var(--g3);}
select option{background:var(--g1);}
.btn{width:100%;background:linear-gradient(135deg,var(--g2),var(--g3));border:none;border-radius:10px;padding:14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;margin-top:8px;}
.btn:disabled{opacity:0.6;cursor:default;}
.error{background:rgba(184,50,50,0.15);border:0.5px solid rgba(184,50,50,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff8080;margin-bottom:16px;display:none;}
.success-box{background:rgba(74,144,101,0.15);border:0.5px solid rgba(74,144,101,0.4);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--g4);margin-bottom:16px;display:none;}
.links-row{text-align:center;margin-top:18px;font-size:13px;color:var(--g4);}
.links-row a{color:var(--g3);text-decoration:none;}
.back{text-align:center;margin-top:10px;font-size:13px;color:var(--g4);}
.back a{color:var(--g3);text-decoration:none;}
.hint{font-size:11px;color:var(--g4);margin-top:4px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Bina<span>ty</span></div>
  <div class="subtitle">Créer votre compte promoteur</div>
  <div class="error" id="errorMsg"></div>
  <div class="success-box" id="successMsg"></div>

  <div class="form-row">
    <div class="form-group">
      <label>Prénom</label>
      <input type="text" id="prenom" placeholder="Mohammed">
    </div>
    <div class="form-group">
      <label>Nom</label>
      <input type="text" id="nom" placeholder="Karimi">
    </div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="vous@exemple.com">
  </div>

  <div class="form-group">
    <label>Numéro WhatsApp</label>
    <input type="tel" id="whatsapp" placeholder="+212 6XX XXX XXX">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Ville</label>
      <select id="ville">
        <option>Tanger</option>
        <option>Casablanca</option>
        <option>Rabat</option>
        <option>Marrakech</option>
        <option>Agadir</option>
        <option>Fès</option>
        <option>Tétouan</option>
        <option>Autre</option>
      </select>
    </div>
    <div class="form-group">
      <label>Société (optionnel)</label>
      <input type="text" id="societe" placeholder="Votre société">
    </div>
  </div>

  <div class="form-group">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••">
    <div class="hint">8 caractères minimum</div>
  </div>

  <div class="form-group">
    <label>Confirmer le mot de passe</label>
    <input type="password" id="passwordConfirm" placeholder="••••••••">
  </div>

  <button class="btn" id="submitBtn" onclick="inscrire()">Créer mon compte</button>

  <div class="links-row">Déjà un compte ? <a href="login.html">Se connecter</a></div>
  <div class="back"><a href="index.html">← Retour à l'accueil</a></div>
</div>

<script>
const API = 'https://buildra.onrender.com';
if(localStorage.getItem('binaty_user')) window.location.href = 'dashboard.html';
document.addEventListener('keydown', e => { if(e.key==='Enter') inscrire(); });

async function inscrire() {
  const btn = document.getElementById('submitBtn');
  const prenom = document.getElementById('prenom').value.trim();
  const nom = document.getElementById('nom').value.trim();
  const email = document.getElementById('email').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const ville = document.getElementById('ville').value;
  const societe = document.getElementById('societe').value.trim();
  const password = document.getElementById('password').value;
  const passwordConfirm = document.getElementById('passwordConfirm').value;

  hideMessages();

  if(!prenom || !nom || !email || !whatsapp || !password){
    showError('Veuillez remplir tous les champs obligatoires.');
    return;
  }
  if(password.length < 8){
    showError('Le mot de passe doit contenir au moins 8 caractères.');
    return;
  }
  if(password !== passwordConfirm){
    showError('Les mots de passe ne correspondent pas.');
    return;
  }

  btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px"></span> Création...';
  btn.disabled = true;

  try {
    const res = await fetch(API + '/api/inscription', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({nom, prenom, email, whatsapp, ville, societe, password, plan: 'starter'})
    });
    const data = await res.json();
    if(data.success){
      localStorage.setItem('binaty_user', JSON.stringify({nom: data.nom || nom, id: data.id, email}));
      showSuccess('Compte créé ! Redirection vers votre dashboard...');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } else {
      showError(data.error || 'Une erreur est survenue.');
      btn.innerHTML = 'Créer mon compte';
      btn.disabled = false;
    }
  } catch(e) {
    showError('Erreur de connexion. Réessayez.');
    btn.innerHTML = 'Créer mon compte';
    btn.disabled = false;
  }
}

function showError(msg){ const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
function showSuccess(msg){ const el = document.getElementById('successMsg'); el.textContent = msg; el.style.display = 'block'; }
function hideMessages(){ document.getElementById('errorMsg').style.display='none'; document.getElementById('successMsg').style.display='none'; }
</script>
</body>
</html>
